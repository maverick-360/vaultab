<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" rx="16" fill="url(#g)"/>

  <!-- vault wheel mark -->
  <g transform="translate(200,150)" fill="none" stroke="#f8fafc">
    <circle r="62" stroke-width="18"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke-width="13"/>
    <line x1="0" y1="-50" x2="0" y2="50" stroke-width="13"/>
    <circle r="20" fill="#f8fafc" stroke="none"/>
    <circle cx="0" cy="-84" r="11" fill="#f8fafc" stroke="none"/>
    <circle cx="0" cy="84" r="11" fill="#f8fafc" stroke="none"/>
    <circle cx="-84" cy="0" r="11" fill="#f8fafc" stroke="none"/>
    <circle cx="84" cy="0" r="11" fill="#f8fafc" stroke="none"/>
  </g>

  <text x="340" y="140" font-size="64" font-weight="700" fill="#ffffff">Vaultab</text>
  <text x="342" y="185" font-size="24" fill="#e0e7ff">Tab manager, auto-close &amp; time tracker — everything stays on your device</text>

  <!-- saved tab bars -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="342" y="215" width="220" height="26" rx="13"/>
    <rect x="574" y="215" width="150" height="26" rx="13"/>
    <rect x="736" y="215" width="205" height="26" rx="13"/>
  </g>
  <g font-size="14" fill="#4338ca" font-weight="600">
    <text x="362" y="233">📁 Research · 18 links</text>
    <text x="594" y="233">🔒 Locked sites</text>
    <text x="756" y="233">⏱ 3h 57m on github.com</text>
  </g>
</svg>
