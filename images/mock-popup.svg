<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 480" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="4" y="4" width="432" height="472" rx="10" fill="#f9fafb" stroke="#d1d5db"/>

  <!-- header -->
