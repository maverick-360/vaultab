  <!-- footer -->
  <line x1="4" y1="430" x2="436" y2="430" stroke="#e5e7eb"/>
  <text x="18" y="452" font-size="10" fill="#6b7280">Auto-close: on — tabs inactive for 20 min are saved to "Auto Closed" and closed.</text>
