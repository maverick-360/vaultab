    <text x="336" y="198" font-size="10" fill="#9ca3af">css-tricks…</text>
    <text x="408" y="198" fill="#6b7280">🗑</text>
    <line x1="4" y1="208" x2="436" y2="208" stroke="#eef0f2"/>

    <circle cx="26" cy="226" r="7" fill="#0ea5e9"/>
